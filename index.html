<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalRyz Script Access</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#111;
}

/* LOADING SCREEN */

#loading{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
color:white;
}

.loader{
width:90px;
height:90px;
border:8px solid #333;
border-top:8px solid #00ffff;
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:10px;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* BOX UI */

.box{
width:340px;
background:white;
padding:30px;
border-radius:35px;
text-align:center;
box-shadow:
0 0 10px #00ffff,
0 0 20px #00ffff;
}

.avatar{
width:90px;
height:90px;
border-radius:50%;
margin-top:-70px;
border:5px solid white;
object-fit:cover;
}

h2{
color:#111;
margin-top:10px;
}

.owner{
color:#555;
font-size:14px;
}

.counter{
margin-top:8px;
font-size:13px;
color:#444;
}

.tutorial{
display:block;
margin-top:10px;
color:#0066ff;
text-decoration:none;
font-size:14px;
}

.tutorial:hover{
text-decoration:underline;
}

button{
margin-top:15px;
padding:12px 22px;
border:none;
border-radius:30px;
background:black;
color:white;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
background:#333;
}

textarea{
width:100%;
height:120px;
margin-top:15px;
border-radius:15px;
border:1px solid #ccc;
padding:10px;
resize:none;
}

.hidden{
display:none;
}

.timer{
margin-top:10px;
font-size:14px;
color:#222;
}

</style>
</head>

<body>

<!-- LOADING SCREEN -->

<div id="loading">
<div class="loader"></div>
<p>Loading Script Page...</p>
</div>

<div class="box">

<img class="avatar" src="https://files.catbox.moe/588j6j.png">

<h2>Ambil Script Delta</h2>

<p class="owner">Owner : Noval</p>

<p class="counter">👥 Pengunjung : <span id="visit">0</span></p>

<a class="tutorial" href="https://files.catbox.moe/nzqwwf.mp4" target="_blank">
🎥 Lihat Tutorial Ambil Script
</a>

<button onclick="goSafelink()">Ambil Script</button>

<p id="timer" class="timer hidden">Tunggu <span id="count">5</span> detik...</p>

<div id="scriptBox" class="hidden">

<textarea id="script">
  Itu jir yang di atas bukan di sini, lu ambil dari situ
</textarea>

<button onclick="copyScript()">Copy Script</button>

</div>

</div>

<script>

/* LOADING SCREEN */

setTimeout(function(){
document.getElementById("loading").style.display="none";
},2500)

/* COUNTER */

let visit = localStorage.getItem("scriptVisit")

if(!visit){
visit = 0
}

visit++

localStorage.setItem("scriptVisit", visit)

document.getElementById("visit").innerText = visit

/* SAFELINKU */

function goSafelink(){

window.open("https://sfl.gl/jJVbR","_blank")

document.getElementById("timer").classList.remove("hidden")

let time = 5

let interval = setInterval(function(){

time--

document.getElementById("count").innerText = time

if(time <= 0){

clearInterval(interval)

document.getElementById("scriptBox").classList.remove("hidden")

}

},1000)

}

/* COPY SCRIPT */

function copyScript(){

let text = document.getElementById("script")

text.select()

document.execCommand("copy")

alert("Script berhasil di copy!")

}

</script>

</body>
</html>
